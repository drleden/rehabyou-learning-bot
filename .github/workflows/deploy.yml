name: Deploy to VPS

on:
  push:
    branches:
      - claude/new-app-setup-BvOPl

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/rehabyou-new
            git pull origin claude/new-app-setup-BvOPl
            docker compose up -d --build --remove-orphans
            docker compose exec -e PYTHONPATH=/app -T backend alembic upgrade head
            docker image prune -f
            echo "Deploy done at $(date)"
