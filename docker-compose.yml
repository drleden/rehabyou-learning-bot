services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rehabyou}
      POSTGRES_USER: ${POSTGRES_USER:-rehabyou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rehabyou} -d ${POSTGRES_DB:-rehabyou}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rehabyou}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-rehabyou}

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  academy-bot:
    build: ./backend/academy_bot
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rehabyou}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-rehabyou}
      BACKEND_URL: http://backend:8001

volumes:
  pgdata:
