# Nginx config for app.rehabyou.site
# SSL will be added via certbot after initial deploy

# ── Redirect HTTP → HTTPS (enable after certbot) ─────────────────────────────
# server {
#     listen 80;
#     listen [::]:80;
#     server_name app.rehabyou.site;
#     return 301 https://$host$request_uri;
# }

# ── HTTP server (initial deploy, before SSL) ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.rehabyou.site;

    client_max_body_size 25M;

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass          http://localhost:8001;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        proxy_connect_timeout 75s;
        proxy_buffering     off;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass          http://localhost:8001;
        proxy_set_header    Host $host;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        proxy_pass          http://localhost:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/app.rehabyou.site.access.log;
    error_log  /var/log/nginx/app.rehabyou.site.error.log warn;
}
